<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yi Jing-2 專業排盤高清版</title>
    <style>
        :root { --primary: #1565C0; --bg: #f5f5f5; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        input, select { padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; margin: 5px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; margin-bottom: 15px; box-sizing: border-box; }
        .hint-box { background: #E8F5E9; color: #1B5E20; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 14px; margin-bottom: 15px; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 20px; }
        .yao-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; }
        canvas { background: white; width: 100%; border-radius: 12px; display: none; margin-top: 10px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <h2>請輸入啟動密碼</h2>
    <input type="password" id="pw-input" placeholder="Password">
    <button class="btn" onclick="checkAuth()" style="width: 200px; margin-top: 10px;">登入</button>
</div>

<div id="main-app" style="display: none; width: 100%; max-width: 500px;">
    <div class="card">
        <h3>【 Yi Jing-2 專業手機版 】</h3>
        <div id="today-hint" class="hint-box"></div>
        <div style="display: flex; gap: 5px;">
            <select id="m-gan"></select><select id="m-zhi"></select>
            <span style="line-height: 45px;">/</span>
            <select id="d-gan"></select><select id="d-zhi"></select>
        </div>
    </div>

    <div class="card">
        <label>卜卦目的：</label>
        <input type="text" id="purpose" style="width: 90%;" value="測試">
        <div id="yao-inputs"></div>
    </div>

    <button class="btn" onclick="renderChart()">生成完整專業排盤圖</button>
    <canvas id="mainCanvas"></canvas>
</div>

<script>
    const GANS = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
    const ZHIS = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
    const WX_MAP = {"子":"水","丑":"土","寅":"木","卯":"木","辰":"土","巳":"火","午":"火","未":"土","申":"金","酉":"金","戌":"土","亥":"水"};
    const NAJIA = {"乾":["子","寅","辰","午","申","戌"],"震":["子","寅","辰","午","申","戌"],"坎":["寅","辰","午","申","戌","子"],"艮":["辰","午","申","戌","子","寅"],"坤":["未","巳","卯","丑","亥","酉"],"巽":["丑","亥","酉","未","巳","卯"],"離":["卯","丑","亥","酉","未","巳"],"兌":["巳","卯","丑","亥","酉","未"]};
    const BG_INFO = {"111":["乾","天"],"000":["坤","地"],"110":["兌","澤"],"101":["離","火"],"100":["震","雷"],"011":["巽","風"],"010":["坎","水"],"001":["艮","山"]};
    const HEX_DB = {
        "乾乾": ["金", 6, "六沖", "乾為天"], "坤坤": ["土", 6, "六沖", "坤為地"], "兌坎": ["金", 1, "六合", "澤水困"], 
        "坤離": ["水", 4, "遊魂", "地火明夷"], "艮巽": ["木", 3, "遊魂", "山風蠱"], "兌震": ["金", 3, "歸魂", "雷澤歸妹"]
    };

    function checkAuth() {
        if (btoa(document.getElementById('pw-input').value) === "NTAxNVBpZzE5NDM=") {
            document.getElementById('auth-screen').remove();
            document.getElementById('main-app').style.display = 'block';
            initApp();
        } else { alert("密碼錯誤！"); }
    }

    function initApp() {
        const selects = ['m-gan', 'm-zhi', 'd-gan', 'd-zhi'];
        selects.forEach(id => {
            const list = id.includes('gan') ? GANS : ZHIS;
            const el = document.getElementById(id);
            list.forEach(v => el.add(new Option(v, v)));
        });

        const container = document.getElementById('yao-inputs');
        ["六爻", "五爻", "四爻", "三爻", "二爻", "初爻"].forEach((name, i) => {
            const row = document.createElement('div');
            row.className = 'yao-row';
            row.innerHTML = `<span>${name}</span><select id="y-${5-i}"><option value="2">2 (⚋)</option><option value="1">1 (⚊)</option><option value="0">0 (×)</option><option value="3">3 (○)</option></select><span id="s-${5-i}">總和: 7</span>`;
            container.appendChild(row);
            row.querySelector('select').onchange = (e) => {
                const h = parseInt(e.target.value);
                document.getElementById(`s-${5-i}`).innerText = `總和: ${h*2 + (3-h)*3}`;
            };
        });

        const base = new Date('2026-03-22'), now = new Date();
        const diff = Math.floor((now - base) / (1000*60*60*24));
        const dg = GANS[(GANS.indexOf("乙") + diff) % 10], dz = ZHIS[(ZHIS.indexOf("未") + diff) % 12];
        document.getElementById('today-hint').innerText = `【今日提示】${now.toLocaleDateString()}：辛卯月 / ${dg}${dz}日`;
        document.getElementById('m-gan').value = "辛"; document.getElementById('m-zhi').value = "卯";
        document.getElementById('d-gan').value = dg; document.getElementById('d-zhi').value = dz;
    }

    function getEvo(o_dz, c_dz, wx) {
        let res = "";
        if (WX_MAP[o_dz] === WX_MAP[c_dz]) {
            let diff = (ZHIS.indexOf(c_dz) - ZHIS.indexOf(o_dz) + 12) % 12;
            if (diff === 1) res = "(化進)"; else if (diff === 11) res = "(化退)";
        }
        const wx_o = ["木","火","土","金","水"];
        let d = (wx_o.indexOf(WX_MAP[c_dz]) - wx_o.indexOf(WX_MAP[o_dz]) + 5) % 5;
        if (d === 4) res += "(回頭生)"; else if (d === 3) res += "(回頭剋)";
        return res;
    }

    function renderChart() {
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        canvas.style.display = 'block';
        canvas.width = 1400; canvas.height = 1100;
        ctx.fillStyle = "white"; ctx.fillRect(0, 0, 1400, 1100);

        const yaos = [], changes = [], cy_yaos = [];
        for (let i = 0; i < 6; i++) {
            const v = parseInt(document.getElementById(`y-${i}`).value);
            yaos.push(v === 1 || v === 3 ? "1" : "0");
            changes.push(v === 0 || v === 3);
            cy_yaos.push((v === 0 && yaos[i]==="0") || (v === 3 && yaos[i]==="1") ? "0" : (v === 0 && yaos[i]==="1") || (v === 3 && yaos[i]==="0") ? "1" : yaos[i]);
        }

        const [ln_n, ln_s] = BG_INFO[yaos.slice(0,3).join('')], [un_n, un_s] = BG_INFO[yaos.slice(3,6).join('')];
        const [wx, shi, type, fullN] = HEX_DB[un_n + ln_n] || ["土", 1, "平卦", un_n + ln_n];

        const dg_i = GANS.indexOf(document.getElementById('d-gan').value), dz_i = ZHIS.indexOf(document.getElementById('d-zhi').value);
        const kw = [ZHIS[(dz_i - dg_i - 2 + 12) % 12], ZHIS[(dz_i - dg_i - 1 + 12) % 12]];

        ctx.fillStyle = "black"; ctx.font = "bold 45px Microsoft JhengHei";
        ctx.fillText(`【 卜卦結果 - Yi Jing-2 】 月：${document.getElementById('m-gan').value}${document.getElementById('m-zhi').value} / 日：${document.getElementById('d-gan').value}${document.getElementById('d-zhi').value}`, 60, 80);
        ctx.fillStyle = "red"; ctx.font = "32px Microsoft JhengHei";
        ctx.fillText(`日期時間：${new Date().toLocaleString()} (旬空：${kw.join('')})`, 60, 135);

        ctx.fillStyle = "#1B5E20"; ctx.font = "28px Microsoft JhengHei";
        ctx.fillText(`● 填實月：${kw[0]}月 ● 填實日：${kw[0]}(未來) ● 沖實日：${ZHIS[(ZHIS.indexOf(kw[0])+6)%12]}(未來)`, 60, 185);

        ctx.fillStyle = "#FFF9C4"; ctx.fillRect(60, 220, 1100, 70); ctx.strokeRect(60, 220, 1100, 70);
        ctx.fillStyle = "#BF360C"; ctx.font = "30px Microsoft JhengHei";
        ctx.fillText(`卦性診斷：${type === '六沖' ? '【六沖】波動劇烈，主散主快' : type === '遊魂' ? '【遊魂】主變動不安，宜動不宜守' : '【平卦】事態平穩'}`, 100, 265);

        ctx.fillStyle = "#5C85BB"; ctx.fillRect(60, 310, 150, 50); ctx.fillStyle="white"; ctx.fillText(`五行：${wx}`, 75, 345);
        if(type!=="平卦") { ctx.fillStyle = "#E67E22"; ctx.fillRect(230, 310, 150, 50); ctx.fillStyle="white"; ctx.fillText(type, 260, 345); }

        const dzs = NAJIA[ln_n].slice(0,3).concat(NAJIA[un_n].slice(3));
        const cln_n = BG_INFO[cy_yaos.slice(0,3).join('')][0];
        const cun_n = BG_INFO[cy_yaos.slice(3,6).join('')][0];
        const cdzs = NAJIA[cln_n].slice(0,3).concat(NAJIA[cun_n].slice(3));

        for (let i = 0; i < 6; i++) {
            const py = 850 - i * 90;
            ctx.fillStyle = "black";
            if (yaos[i] === "1") ctx.fillRect(350, py, 250, 45);
            else { ctx.fillRect(350, py, 105, 45); ctx.fillRect(495, py, 105, 45); }
            
            if (changes[i]) {
                ctx.fillStyle = "red"; ctx.font = "40px Arial"; ctx.fillText(yaos[i] === "1" ? "○" : "×", 280, py + 35);
            }

            ctx.fillStyle = "black"; ctx.font = "36px Microsoft JhengHei";
            const kt = kw.includes(dzs[i]) ? "(空)" : "";
            const lq = ["兄弟","子孫","妻財","官鬼","父母"][(["木","火","土","金","水"].indexOf(WX_MAP[dzs[i]]) - ["木","火","土","金","水"].indexOf(wx) + 5) % 5];
            let txt = `${dzs[i]}${kt} ${lq}`;
            if (changes[i]) {
                const clq = ["兄弟","子孫","妻財","官鬼","父母"][(["木","火","土","金","水"].indexOf(WX_MAP[cdzs[i]]) - ["木","火","土","金","水"].indexOf(wx) + 5) % 5];
                txt += ` → ${cdzs[i]} ${clq} ${getEvo(dzs[i], cdzs[i], wx)}`;
            }
            ctx.fillText(txt, 880, py + 35);
            if (i+1 === shi) { ctx.fillStyle="blue"; ctx.fillText("世", 810, py + 35); }
            else if (i+1 === (shi>3?shi-3:shi+3)) { ctx.fillStyle="black"; ctx.fillText("應", 810, py + 35); }
        }

        // --- 修正：高清括號與卦名說明 ---
        ctx.strokeStyle = "blue"; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(610, 395); ctx.lineTo(630, 395); ctx.lineTo(630, 655); ctx.lineTo(610, 655); ctx.stroke();
        ctx.fillStyle="blue"; ctx.font="bold 32px Microsoft JhengHei"; // 加大加粗
        ctx.fillText(`上卦：${un_n}(${un_s})`, 650, 535); // 位置右移
        
        ctx.strokeStyle = "red";
        ctx.beginPath(); ctx.moveTo(610, 665); ctx.lineTo(630, 665); ctx.lineTo(630, 925); ctx.lineTo(610, 925); ctx.stroke();
        ctx.fillStyle="red"; ctx.font="bold 32px Microsoft JhengHei"; // 加大加粗
        ctx.fillText(`下卦：${ln_n}(${ln_s})`, 650, 805); // 位置右移

        ctx.fillStyle = "black"; ctx.font = "bold 65px Microsoft JhengHei";
        ctx.fillText(`【 ${fullN} 】`, 500, 1020);
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>
</body>
</html>
